<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2874f0">
  <title>Payments</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="css/flipkart.css">
  <style>
    .pay-wrap { max-width: 560px; margin: 0 auto; padding-bottom: 84px; }
    .card { background: #fff; border: 1px solid #e4e4e4; border-radius: 6px; margin: 10px 0; padding: 12px; }
    .option { display: flex; align-items: center; gap: 14px; border: 1px solid #d6d6d6; border-radius: 16px; padding: 14px; margin: 12px 0; cursor: pointer; }
    .option img { width: 48px; height: 48px; object-fit: contain; }
    .option .label { font-size: 22px; color: #222; }
    .option.active { border-color: #2874f0; box-shadow: 0 0 0 1px #2874f0 inset; }
    .head { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; font-size: 16px; margin: 8px 0; }
    .green { color: #0a9a20; }
    .safe { background: #eceff1; color: #666; padding: 14px 16px; font-size: 14px; margin: 12px 0; }
    .footer { position: fixed; left: 0; right: 0; bottom: 0; max-width: 560px; margin: 0 auto; background: #fff; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
    .total { font-size: 34px; font-weight: 700; }
    .btn { background: #ffc107; border: none; border-radius: 4px; padding: 12px 24px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <header class="fk-header">
    <a href="order-summary.html" class="fk-back" aria-label="Back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <span style="font-weight:600">Payments</span>
    <span style="width:24px"></span>
  </header>

  <div class="fk-stepper">
    <div class="step"><span class="num">1</span> Address</div>
    <div class="step"><span class="num">2</span> Order Summary</div>
    <div class="step active"><span class="num">3</span> Payment</div>
  </div>

  <div class="pay-wrap">
    <div class="card">
      <div class="option active" data-method="phonepe" onclick="handleOptionClick(this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" alt="PhonePe">
        <span class="label">PhonePe</span>
      </div>
      <div class="option" data-method="paytm" onclick="handleOptionClick(this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" alt="Paytm">
        <span class="label">Paytm</span>
      </div>
      <div class="option" data-method="upi" onclick="handleOptionClick(this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo-vector.svg" alt="UPI">
        <span class="label">UPI App</span>
      </div>
      <div class="option" data-method="scan" onclick="selectMethod(this)">
        <img src="scan.png" alt="Scan to Pay" onerror="this.style.display='none'">
        <span class="label">SCAN TO PAY</span>
      </div>
    </div>

    <div class="card">
      <div class="head">Price Details</div>
      <div class="row"><span>Price (1 item)</span><span id="mrpRow">Rs0</span></div>
      <div class="row"><span>Delivery Charges</span><span class="green">FREE</span></div>
      <hr style="border:none;border-top:1px solid #ececec;margin:10px 0">
      <div class="row"><span>Amount Payable</span><span id="payableRow">Rs0</span></div>
    </div>

    <div class="safe">Safe and secure payments. Easy returns. 100% Authentic products.</div>
  </div>

  <div class="footer">
    <div class="total" id="bottomTotal">Rs0</div>
    <button class="btn" onclick="orderNow()">Order Now</button>
  </div>

  <script src="js/app.js"></script>
  <script>
    let selectedMethod = 'phonepe';
    let upiPayload = { upiId: '', name: 'Store', note: 'Order Payment' };

    function formatRs(v) { return '\u20B9' + Number(v || 0).toFixed(0); }

    function selectMethod(el) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
      el.classList.add('active');
      selectedMethod = el.dataset.method || 'phonepe';
    }

    function buildDeepLink(method) {
      const upiId = (upiPayload.upiId || '').trim();
      if (!upiId) return '';
      const amount = Number(price || 0).toFixed(2);
      const pa = encodeURIComponent(upiId);
      const pn = encodeURIComponent(upiPayload.name || 'Store');
      const tn = encodeURIComponent(upiPayload.note || 'Order Payment');
      const commonParams = `pa=${pa}&pn=${pn}&am=${amount}&cu=INR&tn=${tn}`;
      if (method === 'phonepe') return `phonepe://pay?${commonParams}`;
      if (method === 'paytm') return `paytmmp://pay?${commonParams}`;
      return `upi://pay?${commonParams}`;
    }

    function handleOptionClick(el) {
      selectMethod(el);
      if (selectedMethod === 'phonepe' || selectedMethod === 'paytm' || selectedMethod === 'upi') {
        const deepLink = buildDeepLink(selectedMethod);
        if (!deepLink) {
          alert('UPI ID not found. Please set it in admin panel or use SCAN TO PAY.');
          return;
        }
        window.location.href = deepLink;
      }
    }

    function orderNow() {
      localStorage.setItem('selectedPaymentMethod', selectedMethod);
      if (selectedMethod === 'scan') {
        window.location.href = 'scanner.html';
        return;
      }

      const deepLink = buildDeepLink(selectedMethod);
      if (!deepLink) {
        alert('UPI ID not found. Please set it in admin panel or use SCAN TO PAY.');
        return;
      }
      window.location.href = deepLink;
    }

    const items = JSON.parse(localStorage.getItem('products') || '[]');
    const item = items[0] || {};
    const qty = item.qty || 1;
    const price = Number(item.price || 0) * qty;
    const mrp = Number(item.mrp || item.price || 0) * qty;

    document.getElementById('mrpRow').textContent = formatRs(mrp);
    document.getElementById('payableRow').textContent = formatRs(price);
    document.getElementById('bottomTotal').textContent = formatRs(price);

    (async function initUpi() {
      if (typeof APP === 'undefined') {
        const localUpi = JSON.parse(localStorage.getItem('fk_upi') || '{}');
        upiPayload = {
          upiId: localUpi.upiId || '',
          name: localUpi.name || 'Store',
          note: localUpi.note || 'Order Payment'
        };
        return;
      }
      await APP.initFirebase();
      const upi = await APP.getUpiAsync();
      upiPayload = {
        upiId: (upi && upi.upiId) || '',
        name: (upi && upi.name) || 'Store',
        note: (upi && upi.note) || 'Order Payment'
      };
    })();
  </script>
</body>
</html>
